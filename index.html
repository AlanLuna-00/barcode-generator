<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moonland – Etiquetas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.5/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
      }
      input {
        font-family: Arial, sans-serif;
      }
      .input {
        border: 1px solid #d1d5db;
        border-radius: 4px;
        padding: 3px 6px;
        font-size: 13px;
        width: 100%;
        outline: none;
      }
      .input:focus {
        border-color: #3b82f6;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useRef, useCallback } = React;

      function normalizeHeader(h) {
        return h
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .toLowerCase()
          .trim();
      }

      function parseLatin1(buffer) {
        const bytes = new Uint8Array(buffer);
        return Array.from(bytes)
          .map((b) => String.fromCharCode(b))
          .join("");
      }

      function parseCSV(text) {
        const allLines = text.split(/\r?\n/);
        let headerIdx = -1;
        for (let i = 0; i < allLines.length; i++) {
          const norm = normalizeHeader(allLines[i]);
          if (norm.includes("tipo") && norm.includes("nombre")) {
            headerIdx = i;
            break;
          }
        }
        if (headerIdx === -1) return [];

        const headers = allLines[headerIdx].split(";").map(normalizeHeader);
        const idx = (name) =>
          headers.findIndex(
            (h) =>
              h === normalizeHeader(name) || h.includes(normalizeHeader(name)),
          );
        const iNombre = idx("nombre");
        const iCodigo = idx("codigo de barras");
        const iTipo = idx("tipo");
        const iInventariable = idx("item inventariable");

        const rows = [];
        for (let i = headerIdx + 1; i < allLines.length; i++) {
          const line = allLines[i];
          if (!line.trim()) continue;
          const cols = line.split(";");
          if ((cols[iTipo] || "").trim() === "Servicio") continue;
          if ((cols[iInventariable] || "").trim() === "No") continue;
          const nombre = (cols[iNombre] || "").trim();
          const codigo = (cols[iCodigo] || "").trim();
          if (!nombre && !codigo) continue;
          const parts = nombre.split("/").map((p) => p.trim());
          rows.push({
            id: crypto.randomUUID(),
            nombre: parts[0] || "",
            codigo,
            talle: parts[2] || "",
            color: parts[1] || "",
          });
        }
        return rows;
      }

      async function generateBarcodeDataURL(code) {
        const canvas = document.createElement("canvas");
        JsBarcode(canvas, code, {
          format: "CODE128",
          width: 2,
          height: 40,
          displayValue: false,
          margin: 2,
        });
        return canvas.toDataURL("image/png");
      }

      function App() {
        const [rows, setRows] = useState([]);
        const [labels, setLabels] = useState([]);
        const [loading, setLoading] = useState(false);
        const [exporting, setExporting] = useState(false);
        const [status, setStatus] = useState("");
        const fileRef = useRef(null);

        const handleCSV = useCallback(async (e) => {
          const file = e.target.files[0];
          if (!file) return;
          setStatus("Leyendo CSV...");
          const buffer = await file.arrayBuffer();
          const text = parseLatin1(buffer);
          const parsed = parseCSV(text);
          setRows(parsed);
          setLabels([]);
          setStatus(`${parsed.length} productos importados.`);
          e.target.value = "";
        }, []);

        const addRow = () =>
          setRows((r) => [
            ...r,
            {
              id: crypto.randomUUID(),
              nombre: "",
              codigo: "",
              talle: "",
              color: "",
            },
          ]);
        const removeRow = (id) => setRows((r) => r.filter((x) => x.id !== id));
        const updateRow = (id, field, val) =>
          setRows((r) =>
            r.map((x) => (x.id === id ? { ...x, [field]: val } : x)),
          );

        const generateLabels = async () => {
          setLoading(true);
          setStatus("Generando etiquetas...");
          try {
            const result = [];
            for (const row of rows) {
              if (!row.codigo) continue;
              try {
                const dataUrl = await generateBarcodeDataURL(row.codigo);
                result.push({ ...row, dataUrl });
              } catch {
                result.push({ ...row, dataUrl: null });
              }
            }
            setLabels(result);
            setStatus(`${result.length} etiquetas generadas.`);
          } finally {
            setLoading(false);
          }
        };

        const exportPDF = async () => {
          if (!labels.length) return;
          setExporting(true);
          setStatus("Generando PDF...");
          try {
            const { jsPDF } = window.jspdf;
            const LW = 40,
              LH = 22;
            const marginX = 10,
              marginY = 10;
            const cols = Math.floor((210 - marginX * 2) / LW);
            const rowsPerPage = Math.floor((297 - marginY * 2) / LH);
            const doc = new jsPDF({ unit: "mm", format: "a4" });

            labels.forEach((l, i) => {
              const col = i % cols;
              const row = Math.floor(i / cols) % rowsPerPage;
              if (i > 0 && col === 0 && row === 0) doc.addPage();
              const x = marginX + col * LW;
              const y = marginY + row * LH;

              doc.setDrawColor(180);
              doc.setLineWidth(0.2);
              doc.rect(x, y, LW, LH);
              doc.setFont("helvetica", "bold");
              doc.setFontSize(6);
              doc.setTextColor(0);
              doc.text("MOONLAND", x + LW / 2, y + 3.5, { align: "center" });
              doc.setFont("helvetica", "normal");
              doc.setFontSize(5.5);
              const nombreTrunc =
                l.nombre.length > 22 ? l.nombre.slice(0, 22) + "…" : l.nombre;
              doc.text(nombreTrunc, x + LW / 2, y + 7, { align: "center" });
              const variante = [l.color, l.talle].filter(Boolean).join(" · ");
              doc.setFontSize(4.5);
              doc.setTextColor(80);
              doc.text(variante, x + LW / 2, y + 10, { align: "center" });
              if (l.dataUrl)
                doc.addImage(l.dataUrl, "PNG", x + 2, y + 11, LW - 4, 8);
              doc.setFontSize(4);
              doc.setTextColor(100);
              doc.text(l.codigo, x + LW / 2, y + 20.5, { align: "center" });
            });

            doc.save("etiquetas-moonland.pdf");
            setStatus("✅ PDF descargado.");
          } catch (err) {
            setStatus("Error: " + err.message);
          } finally {
            setExporting(false);
          }
        };

        return (
          <div
            style={{ minHeight: "100vh", background: "#f5f5f5", padding: 24 }}
          >
            <div style={{ maxWidth: 900, margin: "0 auto" }}>
              <div
                style={{
                  background: "#111",
                  color: "white",
                  borderRadius: 10,
                  padding: "18px 24px",
                  marginBottom: 20,
                  display: "flex",
                  alignItems: "center",
                  justifyContent: "space-between",
                  flexWrap: "wrap",
                  gap: 10,
                }}
              >
                <div>
                  <div
                    style={{ fontSize: 22, fontWeight: 800, letterSpacing: 3 }}
                  >
                    MOONLAND
                  </div>
                  <div style={{ fontSize: 12, color: "#aaa", marginTop: 2 }}>
                    Generador de etiquetas con código de barras
                  </div>
                </div>
                <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
                  <button
                    onClick={() => fileRef.current.click()}
                    style={{
                      background: "#333",
                      color: "white",
                      border: "1px solid #555",
                      borderRadius: 6,
                      padding: "8px 16px",
                      cursor: "pointer",
                      fontSize: 13,
                    }}
                  >
                    📂 Importar CSV
                  </button>
                  <input
                    ref={fileRef}
                    type="file"
                    accept=".csv"
                    style={{ display: "none" }}
                    onChange={handleCSV}
                  />
                  <button
                    onClick={generateLabels}
                    disabled={loading || !rows.length}
                    style={{
                      background: rows.length ? "#2563eb" : "#555",
                      color: "white",
                      border: "none",
                      borderRadius: 6,
                      padding: "8px 16px",
                      cursor: rows.length ? "pointer" : "not-allowed",
                      fontSize: 13,
                    }}
                  >
                    {loading ? "Generando..." : "⚡ Generar etiquetas"}
                  </button>
                  <button
                    onClick={exportPDF}
                    disabled={exporting || !labels.length}
                    style={{
                      background: labels.length ? "#16a34a" : "#555",
                      color: "white",
                      border: "none",
                      borderRadius: 6,
                      padding: "8px 16px",
                      cursor: labels.length ? "pointer" : "not-allowed",
                      fontSize: 13,
                    }}
                  >
                    {exporting ? "Exportando..." : "📄 Descargar PDF"}
                  </button>
                </div>
              </div>

              {status && (
                <div
                  style={{
                    background: "#e0f2fe",
                    border: "1px solid #7dd3fc",
                    borderRadius: 6,
                    padding: "8px 14px",
                    marginBottom: 16,
                    fontSize: 13,
                    color: "#0369a1",
                  }}
                >
                  {status}
                </div>
              )}

              <div
                style={{
                  background: "white",
                  borderRadius: 10,
                  border: "1px solid #e5e7eb",
                  marginBottom: 20,
                  overflow: "hidden",
                }}
              >
                <div
                  style={{
                    display: "flex",
                    justifyContent: "space-between",
                    alignItems: "center",
                    padding: "12px 16px",
                    borderBottom: "1px solid #e5e7eb",
                  }}
                >
                  <span style={{ fontWeight: 700, fontSize: 15 }}>
                    Productos ({rows.length})
                  </span>
                  <button
                    onClick={addRow}
                    style={{
                      background: "#f0f9ff",
                      color: "#2563eb",
                      border: "1px solid #bfdbfe",
                      borderRadius: 6,
                      padding: "5px 12px",
                      cursor: "pointer",
                      fontSize: 13,
                    }}
                  >
                    + Agregar fila
                  </button>
                </div>
                <div style={{ overflowX: "auto" }}>
                  <table
                    style={{
                      width: "100%",
                      borderCollapse: "collapse",
                      fontSize: 13,
                    }}
                  >
                    <thead>
                      <tr style={{ background: "#f9fafb" }}>
                        {[
                          "Nombre",
                          "Código de barras",
                          "Color",
                          "Talle",
                          "",
                        ].map((h) => (
                          <th
                            key={h}
                            style={{
                              padding: "8px 12px",
                              textAlign: "left",
                              fontWeight: 600,
                              color: "#374151",
                              borderBottom: "1px solid #e5e7eb",
                            }}
                          >
                            {h}
                          </th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {rows.length === 0 && (
                        <tr>
                          <td
                            colSpan={5}
                            style={{
                              padding: 24,
                              textAlign: "center",
                              color: "#9ca3af",
                            }}
                          >
                            Importá un CSV o agregá filas manualmente
                          </td>
                        </tr>
                      )}
                      {rows.map((row) => (
                        <tr
                          key={row.id}
                          style={{ borderBottom: "1px solid #f3f4f6" }}
                        >
                          <td style={{ padding: "6px 12px" }}>
                            <input
                              className="input"
                              value={row.nombre}
                              onChange={(e) =>
                                updateRow(row.id, "nombre", e.target.value)
                              }
                            />
                          </td>
                          <td style={{ padding: "6px 12px" }}>
                            <input
                              className="input"
                              value={row.codigo}
                              onChange={(e) =>
                                updateRow(row.id, "codigo", e.target.value)
                              }
                              style={{ fontFamily: "monospace" }}
                            />
                          </td>
                          <td style={{ padding: "6px 12px" }}>
                            <input
                              className="input"
                              value={row.color}
                              onChange={(e) =>
                                updateRow(row.id, "color", e.target.value)
                              }
                            />
                          </td>
                          <td style={{ padding: "6px 12px" }}>
                            <input
                              className="input"
                              value={row.talle}
                              onChange={(e) =>
                                updateRow(row.id, "talle", e.target.value)
                              }
                              style={{ width: 60 }}
                            />
                          </td>
                          <td style={{ padding: "6px 12px" }}>
                            <button
                              onClick={() => removeRow(row.id)}
                              style={{
                                background: "none",
                                border: "none",
                                color: "#ef4444",
                                cursor: "pointer",
                                fontSize: 16,
                              }}
                            >
                              ✕
                            </button>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>

              {labels.length > 0 && (
                <div
                  style={{
                    background: "white",
                    borderRadius: 10,
                    border: "1px solid #e5e7eb",
                    padding: 16,
                  }}
                >
                  <div
                    style={{ fontWeight: 700, fontSize: 15, marginBottom: 14 }}
                  >
                    Preview ({labels.length} etiquetas)
                  </div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                    {labels.map((l) => (
                      <div
                        key={l.id}
                        style={{
                          width: 151,
                          height: 83,
                          border: "1px solid #d1d5db",
                          borderRadius: 4,
                          display: "flex",
                          flexDirection: "column",
                          alignItems: "center",
                          justifyContent: "center",
                          padding: 4,
                          background: "white",
                          overflow: "hidden",
                        }}
                      >
                        <div
                          style={{
                            fontSize: 8,
                            fontWeight: 800,
                            letterSpacing: 2,
                          }}
                        >
                          MOONLAND
                        </div>
                        <div
                          style={{
                            fontSize: 8,
                            fontWeight: 600,
                            textAlign: "center",
                            maxWidth: "100%",
                            overflow: "hidden",
                            whiteSpace: "nowrap",
                            textOverflow: "ellipsis",
                          }}
                        >
                          {l.nombre}
                        </div>
                        <div style={{ fontSize: 7, color: "#666" }}>
                          {[l.color, l.talle].filter(Boolean).join(" · ")}
                        </div>
                        {l.dataUrl && (
                          <img
                            src={l.dataUrl}
                            style={{
                              maxWidth: 140,
                              height: 30,
                              objectFit: "contain",
                            }}
                          />
                        )}
                        <div
                          style={{
                            fontSize: 7,
                            color: "#888",
                            fontFamily: "monospace",
                          }}
                        >
                          {l.codigo}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
